name: Codebase Audit

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      prompt_name:
        description: 'Specific audit category (omit for random)'
        required: false
        type: string
      target_dir:
        description: 'Specific directory to audit (omit for random)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: audit
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          audit_target_dir: ${{ github.event.inputs.target_dir || '' }}
          audit_create_issues: true
          audit_auto_fix: true
          audit_labels: audit
          project_context: |
            Monorepo with:
            - frontend/ — Next.js 16 App Router
            - backend/ — Express REST API
