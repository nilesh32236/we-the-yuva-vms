name: Autofix Review & Fix Loop

on:
  pull_request:
    types: [opened, synchronize, labeled]
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autofix-loop-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'autofix') &&
        !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
        !contains(github.event.pull_request.labels.*.name, 'autofix:needs-manual-review') &&
        !contains(github.event.pull_request.labels.*.name, 'autofix:merged')
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body || '', '/review')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      approved: ${{ steps.review.outputs.verdict }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: nilesh32236/opencode-ai-reviewer@main
        id: review
        with:
          mode: review
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          project_context: |
            Monorepo with:
            - frontend/ — Next.js 16 App Router (React 19, Tailwind v4, TanStack Query)
            - backend/ — Express REST API (Node.js, Prisma, Zod, BullMQ)

  fix:
    needs: [review]
    if: |
      always() &&
      needs.review.result == 'success' &&
      needs.review.outputs.approved != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: fix
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          max_fix_iterations: 3
          run_checks_after_fix: cd frontend && pnpm typecheck && cd ../backend && pnpm typecheck
          project_context: |
            Monorepo with:
            - frontend/ — Next.js 16 App Router
            - backend/ — Express REST API

  auto-merge:
    needs: [review]
    if: needs.review.result == 'success' && needs.review.outputs.approved == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch || {
            echo "::warning::Auto-merge failed"
          }
