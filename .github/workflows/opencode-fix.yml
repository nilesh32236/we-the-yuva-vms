name: opencode-pr-fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: opencode-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: |
      github.actor != 'github-actions[bot]' &&
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body || '', '/fix') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Get PR details
        id: pr
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          HEAD_REF=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.ref')
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.sha')
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_ref }}

      - name: Configure git
        run: |
          git config --global user.name "nilesh32236"
          git config --global user.email "nilesh32236@gmail.com"
          git config --global url."https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Add fix label
        run: |
          gh issue edit ${{ steps.pr.outputs.number }} --add-label "autofix" --repo "${{ github.repository }}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup OpenCode
        run: |
          chmod +x .github/scripts/setup-opencode.sh
          .github/scripts/setup-opencode.sh

      - name: Write fix prompt
        run: |
          cat << 'PROMPT_EOF' > /tmp/opencode-fix-prompt.txt
          You are a Senior Code Fixer. Fix issues listed in the "Fix Ticket" comment on PR #${{ steps.pr.outputs.number }}.
          
          ## Context
          
          This is a monorepo:
          - \`frontend/\` — Next.js 16 App Router (pnpm from \`frontend/\`)
          - \`backend/\` — Express REST API (pnpm from \`backend/\`)
          
          ## Steps
          
          1. Find the Fix Ticket comment by running: \`gh api "repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments"\` and look for the comment whose body starts with "## 🤖 Fix Ticket"
          2. Parse each issue from the ticket's checklist (lines starting with "- [ ] ")
          3. For each issue:
          - Read the referenced file at the reported line
          - Understand the problem
          - Apply a minimal fix
          4. After fixing all issues, determine the correct subdirectory based on changed files. Run from the correct directory:
          - Frontend files: \`cd frontend && pnpm typecheck && pnpm lint\`
          - Backend files: \`cd backend && pnpm typecheck && pnpm lint\`
          - Both: run both
          5. Commit all changes with message "fix: apply fixes from PR review" and push to the branch
          6. Update the Fix Ticket comment: for fixed items change "- [ ] " to "- [x] ", for unfixable items change to "- [ ] ❌ "
          7. Write findings to \`.opencode/review-output.jsonl\` — one issue line per fixed item so the fix review is posted
          
          ## Fix Rules
          
          - Fix only the issues from the Fix Ticket
          - Prefer minimal, targeted fixes over rewrites
          - Do not add features or change unrelated code
          - If fixing requires significant refactoring beyond scope, skip it and mark with ❌
          - Verify every change compiles before committing
          PROMPT_EOF

      - name: Run OpenCode fix
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          opencode run --model opencode/deepseek-v4-flash-free "$(cat /tmp/opencode-fix-prompt.txt)"

      - name: Push fixes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix: apply fixes from PR review"
            git push origin "${{ steps.pr.outputs.head_ref }}"
            echo "Fixes pushed to ${{ steps.pr.outputs.head_ref }}"
          else
            echo "No changes to push"
          fi

      - name: Update Fix Ticket comment
        continue-on-error: true
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          MARKER="<!-- opencode-fix-ticket -->"

          # Get current fix ticket body
          FIX_TICKET=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("## 🤖 Fix Ticket")) | {id: .id, body: .body}' | head -1)

          COMMENT_ID=$(echo "$FIX_TICKET" | jq -r '.id // empty')
          CURRENT_BODY=$(echo "$FIX_TICKET" | jq -r '.body // empty')

          if [ -z "$COMMENT_ID" ] || [ -z "$CURRENT_BODY" ]; then
            echo "No Fix Ticket comment found to update"
            exit 0
          fi

          # Update the ticket: mark items as fixed based on what was changed
          {
            echo "$CURRENT_BODY"
            echo ""
            echo "---"
            echo "*Fix applied on $(date -u +'%Y-%m-%dT%H:%M:%SZ'). Review the changes above for completed items.*"
          } > /tmp/updated-ticket.md
          UPDATED_BODY=$(cat /tmp/updated-ticket.md)

          jq -n --rawfile body /tmp/updated-ticket.md '{body: $body}' | \
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH --input - --silent
          echo "Fix ticket updated (comment #${COMMENT_ID})"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Post fix review (update existing or create new)
        continue-on-error: true
        run: |
          FILE=".opencode/review-output.jsonl"
          [ -f "$FILE" ] || { echo "No review output — skipping"; exit 0; }

          PR_NUMBER="${{ steps.pr.outputs.number }}"
          COMMIT_SHA="${{ steps.pr.outputs.head_sha }}"
          REPO="${{ github.repository }}"
          MARKER="<!-- opencode-fix-review -->"

          SUMMARY=$(jq -r 'select(.type=="summary")|.text' "$FILE" 2>/dev/null | head -1)
          [ -z "$SUMMARY" ] && SUMMARY="Fixes applied based on the Fix Ticket."

          # Build review body
          {
            echo "## PR Fix Summary"
            echo ""
            echo "${SUMMARY}"
            echo ""
            echo "Issues were fixed based on the Fix Ticket. See the ticket comment for the status of each issue."
          } > /tmp/fix-review-body.md

          # Use post-or-update-comment helper
          chmod +x .github/scripts/post-or-update-comment.sh
          .github/scripts/post-or-update-comment.sh \
            "$REPO" \
            "$PR_NUMBER" \
            "$MARKER" \
            /tmp/fix-review-body.md \
            "${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}"

          rm -f /tmp/fix-review-body.md
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
