name: Review Autofix PR

on:
  pull_request:
    types: [opened, synchronize, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: review-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      contains(github.event.pull_request.labels.*.name, 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:reviewed') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:merged') &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name 'nilesh32236'
          git config --global user.email 'nilesh32236@gmail.com'
          git config --global url."https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Ensure labels exist
        run: |
          for label in autofix autofix:reviewed autofix:needs-manual-review autofix:merged; do
            gh label create "$label" --force 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Check iteration limit
        id: check-iterations
        run: |
          MAX_ITER=3
          COUNT=$(gh pr view ${{ github.event.pull_request.number }} \
            --json comments --jq '[.comments[] | select(.body | startswith("<!-- autofix-iteration:"))] | length' \
            2>/dev/null || echo "0")
          echo "iteration=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge "$MAX_ITER" ]; then
            echo "Exceeded max $MAX_ITER review iterations. Manual review needed."
            gh pr edit ${{ github.event.pull_request.number }} \
              --remove-label "autofix" \
              --add-label "autofix:needs-manual-review"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Run OpenCode to review and improve PR
        if: steps.check-iterations.outputs.skip != 'true'
        id: opencode-review
        continue-on-error: true
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          share: true
          prompt: |
            Review this pull request in the we-the-yuva monorepo.

            ## Context
            - **`frontend/`** — Next.js 16 App Router (React 19, Tailwind v4, axios, TanStack Query, Serwist PWA)
            - **`backend/`** — Express REST API (Node.js, Prisma, Zod, BullMQ, vitest)

            ## Linked Issue Context (If any)
            - Parse the PR description (and commit messages) for any linked issue number(s) (e.g. "Closes #123", "Fixes #123", or just "#123").
            - If a linked issue exists, use the GitHub API or `gh` CLI to read that linked issue's body and all comments to gain the full context of what was requested and any discussions/feedback.

            Before reviewing:
            1. Determine which project(s) the PR touches based on file paths
            2. For frontend files, read `frontend/AGENTS.md` for conventions and `frontend/biome.json` for linting rules
            3. For backend files, read `backend/README.md` and `backend/biome.json`

            ## Context Window Management
            If the PR touches more than 10 files, batch them into groups of at most 3 files.
            Dispatch a sub-agent for each batch via the `task` tool with `subagent_type: "general"`.
            Collect all results before proceeding.

            ## What to Check
            - **Correctness**: Does the fix work for all edge cases? Verify changes actually fix the described issue.
            - **Regressions**: Could this break other functionality?
            - **Security**: PII exposure, missing auth/RBAC checks (volunteer vs coordinator vs admin), XSS vectors, hardcoded secrets, JWT handling, Prisma raw query parameters.
            - **Conventions**: Biome compliance, project conventions from the correct AGENTS.md/README.md.
            - **TypeScript**: No `any`, no type errors, proper types.
            - **Error handling**: Does the fix handle failure modes gracefully?
            - **Dead code**: Unused imports, console.log, commented-out code, YAGNI violations.
            - **HTML/DOM correctness**: Duplicate id attributes, htmlFor mismatches, improper nesting.
            - **UX/accessibility**: Proper ARIA, keyboard nav, mobile touch targets.
            - **Performance**: No unnecessary re-renders, proper image optimization.
            - **Next.js 16 idioms**: async params, proper directives.

            ## Severity Guide
            - **critical**: Bug, security hole, broken functionality — must fix before merge
            - **important**: Architecture concern, maintainability debt, missing error handling, accessibility gaps — should fix
            - **minor**: Style, naming, optimization — nice to have

            ## Calibration
            - Reference specific file paths and line numbers for every issue
            - Explain WHY each issue matters, not just what is wrong
            - Acknowledge what was done well before listing issues

            ## Safety Rules (CRITICAL)
            - ONLY change files that are part of this PR's scope
            - Do NOT add new features or fix unrelated issues
            - If a change would require significant refactoring outside the PR scope, note it but don't do it
            - If you are unsure about a change, DO NOT make it — note it in the summary
            - Verify every change compiles before committing
            - Prefer minimal, focused fixes over comprehensive rewrites

            ## Decision Rules
            - If all changes look correct and no improvements needed:
              Write to `.review-approved.md` with "All checks passed"
            - If you made improvements:
              Write to `.review-summary.md` with:
              - What was improved and why
              - Any concerns that remain
              - Verification that types still pass
            - If you have questions about the approach:
              Write to `.review-summary.md` with specific concerns
            - If the fix is wrong or dangerous:
              Write to `.review-summary.md` with:
              - What's wrong and why
              - What the correct fix should be
              - Do NOT attempt a different fix unless you're certain

      - name: Close OpenCode auto-created review PR
        if: steps.check-iterations.outputs.skip != 'true'
        id: close-review-pr
        run: |
          PR_BRANCH="${{ github.head_ref }}"
          REVIEW_PR=$(gh pr list --state open --json headRefName,baseRefName,number \
            --jq ".[] | select(.headRefName | startswith(\"opencode/\")) | select(.baseRefName == \"${PR_BRANCH}\") | .number" \
            | head -1)

          if [ -n "$REVIEW_PR" ]; then
            REVIEW_BRANCH=$(gh pr view "$REVIEW_PR" --json headRefName --jq '.headRefName')
            echo "Found OpenCode review branch: $REVIEW_BRANCH for PR branch $PR_BRANCH"
            git fetch origin "$REVIEW_BRANCH"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "review_branch=$REVIEW_BRANCH" >> "$GITHUB_OUTPUT"
            echo "review_pr=$REVIEW_PR" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "review_branch=" >> "$GITHUB_OUTPUT"
            echo "review_pr=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Apply review fixes
        if: steps.check-iterations.outputs.skip != 'true' && steps.close-review-pr.outputs.has_changes == 'true'
        run: |
          PR_BRANCH="${{ github.head_ref }}"
          REVIEW_BRANCH="${{ steps.close-review-pr.outputs.review_branch }}"
          git checkout "$PR_BRANCH"
          git cherry-pick "origin/$REVIEW_BRANCH" --strategy=recursive -X theirs 2>/dev/null || \
            git merge "origin/$REVIEW_BRANCH" --no-edit 2>/dev/null || true
          git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push origin "$PR_BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Close OpenCode PR
        if: steps.check-iterations.outputs.skip != 'true' && steps.close-review-pr.outputs.has_changes == 'true'
        run: |
          REVIEW_PR="${{ steps.close-review-pr.outputs.review_pr }}"
          gh pr close "$REVIEW_PR" --delete-branch || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Post review comment
        if: steps.check-iterations.outputs.skip != 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          ITER=${{ steps.check-iterations.outputs.iteration }}

          if [ -f .review-summary.md ]; then
            BODY="<!-- autofix-iteration: ${ITER} -->\n## Review Summary\n\n$(cat .review-summary.md)"
            gh pr comment "$PR_NUM" --body "$(echo -e "$BODY")"
          fi

          if [ -f .review-approved.md ]; then
            BODY="<!-- autofix-iteration: ${ITER} -->\n## Review Approved\n\n$(cat .review-approved.md)"
            gh pr comment "$PR_NUM" --body "$(echo -e "$BODY")"
            gh pr edit "$PR_NUM" --add-label "autofix:reviewed" --remove-label "autofix"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Close original issue on merge
        if: steps.check-iterations.outputs.skip != 'true'
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PR_BODY=$(gh pr view "$PR_NUM" --json body --jq '.body')
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP 'Fixes #\K[0-9]+' || echo "")
          if [ -n "$ISSUE_NUM" ]; then
            gh issue close "$ISSUE_NUM" \
              --comment "Closed by PR #${PR_NUM}" \
              --repo "${{ github.repository }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
