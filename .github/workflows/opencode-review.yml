name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'pull_request' &&
          !contains(github.event.pull_request.labels.*.name, 'autofix') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:merged')) ||
        (github.event_name == 'issue_comment' &&
          (contains(github.event.comment.body || '', '/oc') || contains(github.event.comment.body || '', '/review')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.number && format('refs/pull/{0}/head', github.event.issue.number) }}

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: review
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          project_context: |
            Monorepo with two independent projects:
            - frontend/ — Next.js 16 App Router (React 19, Tailwind v4, TanStack Query)
            - backend/ — Express REST API (Node.js, Prisma, Zod, BullMQ)
          review_prompt_extra: |
            Frontend conventions: frontend/AGENTS.md
            Backend conventions: backend/README.md
