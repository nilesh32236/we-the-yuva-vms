name: AI Self Review & Audit

on:
  pull_request:
    types: [opened, synchronize, labeled, closed]
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      audit_category:
        description: 'Specific audit category (omit for random)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.sha }}
  cancel-in-progress: true

env:
  CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}

jobs:
  # ─── PR Review (human PRs) ───
  review:
    if: |
      github.event_name != 'schedule' &&
      github.event.action != 'closed' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'autofix') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
      !contains(github.event.pull_request.labels.*.name, 'autofix:merged') &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          (contains(github.event.comment.body || '', '/review') || contains(github.event.comment.body || '', '/oc'))
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve PR Ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "${{ github.event.issue.pull_request }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.ref }}

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: review
          model: 'opencode/deepseek-v4-flash-free'
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          project_context: |
            Monorepo: WeTheYuva Volunteer Management System

            **frontend/** — Next.js 16 App Router (React 19, Tailwind v4, axios, TanStack Query, zod, Serwist PWA, shadcn/ui)
            **backend/** — Express REST API (Node.js, Prisma, Zod, BullMQ, vitest, TypeScript)

            Conventions:
            - Frontend: @/* path alias maps to repo root. Biome (2-space indent, single quotes, trailing commas es5). Read `frontend/AGENTS.md` for full conventions.
            - Backend: @/* path alias maps to backend/src/*. Read `backend/README.md` for context.
            - Theme tokens via CSS variables — never raw hex colors.
            - pnpm is the package manager for both projects.
            - Frontend lint: `cd frontend && pnpm lint`. Typecheck: `cd frontend && pnpm typecheck`.
            - Backend lint: `cd backend && pnpm lint`. Typecheck: `cd backend && pnpm typecheck`.

  # ─── Autofix Review Loop (for autofix PRs) ───
  autofix:
    concurrency:
      group: autofix-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    if: |
      github.event_name != 'schedule' &&
      github.event.action != 'closed' &&
      (
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'autofix') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:approved') &&
          !contains(github.event.pull_request.labels.*.name, 'autofix:merged')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body || '', '/fix')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve PR Ref
        id: resolve-ref
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "${{ github.event.issue.pull_request }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
            REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve-ref.outputs.ref }}

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: fix
          model: 'opencode/deepseek-v4-flash-free'
          max_fix_iterations: 3
          run_checks_after_fix: 'cd frontend && pnpm typecheck && pnpm lint && cd ../backend && pnpm typecheck && pnpm lint'
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          project_context: |
            Monorepo: WeTheYuva Volunteer Management System

            **frontend/** — Next.js 16 App Router (React 19, Tailwind v4, axios, TanStack Query, zod, Serwist PWA, shadcn/ui)
            **backend/** — Express REST API (Node.js, Prisma, Zod, BullMQ, vitest, TypeScript)

            Conventions:
            - Frontend: @/* path alias maps to repo root. Biome (2-space indent, single quotes, trailing commas es5). Read `frontend/AGENTS.md` for full conventions.
            - Backend: @/* path alias maps to backend/src/*. Read `backend/README.md` for context.
            - Theme tokens via CSS variables — never raw hex colors.
            - pnpm is the package manager for both projects.
            - Frontend lint: `cd frontend && pnpm lint`. Typecheck: `cd frontend && pnpm typecheck`.
            - Backend lint: `cd backend && pnpm lint`. Typecheck: `cd backend && pnpm typecheck`.

  # ─── Scheduled Codebase Audit ───
  audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Ensure autofix label exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autofix" --force --color "243cd4" 2>/dev/null || true

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: audit
          model: 'opencode/deepseek-v4-flash-free'
          audit_prompt_name: ${{ inputs.audit_category }}
          audit_target_dirs: 'frontend/app,frontend/components,frontend/lib,frontend/hooks,backend/src'
          audit_create_issues: true
          audit_auto_fix: true
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          project_context: |
            Monorepo: WeTheYuva Volunteer Management System

            **frontend/** — Next.js 16 App Router (React 19, Tailwind v4)
            **backend/** — Express REST API (Node.js, Prisma, Zod, BullMQ, vitest)

            Conventions:
            - Frontend: Read `frontend/AGENTS.md` for conventions.
            - Backend: Read `backend/README.md` for project context.
            - Theme tokens via CSS variables — never raw hex colors.

  # ─── Fix Audit Issue ───
  fix-issue:
    if: |
      github.event.issue.pull_request == null && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '/fix'))
        ||
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'autofix-trigger'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure autofix label exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh label create "autofix" --force --color "243cd4" 2>/dev/null || true

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: fix
          model: 'opencode/deepseek-v4-flash-free'
          max_fix_iterations: 3
          run_checks_after_fix: 'cd frontend && pnpm typecheck && pnpm lint && cd ../backend && pnpm typecheck && pnpm lint'
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          project_context: |
            Monorepo: WeTheYuva Volunteer Management System

            **frontend/** — Next.js 16 App Router (React 19, Tailwind v4, axios, TanStack Query)
            **backend/** — Express REST API (Node.js, Prisma, Zod, BullMQ, vitest)

            Conventions:
            - Frontend: @/* path alias maps to repo root. Read `frontend/AGENTS.md`.
            - Backend: @/* path alias maps to backend/src/*. Read `backend/README.md`.
            - pnpm is the package manager for both projects.

  # ─── Merge Notification ───
  notify-merged:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autofix:ready')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Post merge notification
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          cat <<'EOF' > /tmp/merge-body.txt
          ## ✅ Merged to Main

          PR #${PR_NUMBER} has been merged to \`main\`.

          All autofix issues were resolved before merge. The review agent confirmed the PR was ready.

          ---
          *🤖 This notification was posted automatically by opencode-ai-reviewer*
          EOF
          gh issue comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file /tmp/merge-body.txt

      - name: Update labels
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label "autofix:ready" 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "autofix:merged" 2>/dev/null || true
