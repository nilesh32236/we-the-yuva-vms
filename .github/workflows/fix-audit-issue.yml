name: Fix Audit Issue

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: fix-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: |
      github.event.issue.pull_request == null &&
      (
        (github.event_name == 'issues' &&
          contains(github.event.issue.labels.*.name, 'autofix-trigger') &&
          !contains(github.event.issue.labels.*.name, 'autofix') &&
          !contains(github.event.issue.labels.*.name, 'audit:needs-info')) ||
        (github.event_name == 'issue_comment' &&
          contains(github.event.comment.body || '', '/fix') &&
          !contains(github.event.issue.labels.*.name, 'audit:needs-info'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: nilesh32236/opencode-ai-reviewer@main
        with:
          mode: fix
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          max_fix_iterations: 3
          run_checks_after_fix: cd frontend && pnpm typecheck && cd ../backend && pnpm typecheck
          project_context: |
            Monorepo with:
            - frontend/ — Next.js 16 App Router
            - backend/ — Express REST API
