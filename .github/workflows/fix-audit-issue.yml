name: Fix Audit Issue

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: |
      github.actor != 'github-actions[bot]' &&
      (
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'audit') && !endsWith(github.event.issue.title, 'Minor findings') && contains(github.event.issue.labels.*.name, 'audit:critical') && !contains(github.event.issue.labels.*.name, 'autofix') && !contains(github.event.issue.labels.*.name, 'audit:needs-info')) ||
        (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'audit') && !endsWith(github.event.issue.title, 'Minor findings') && contains(github.event.issue.labels.*.name, 'audit:important') && !contains(github.event.issue.labels.*.name, 'autofix') && !contains(github.event.issue.labels.*.name, 'audit:needs-info')) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '/fix') && github.event.issue.pull_request == null)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config --global user.name 'nilesh32236'
          git config --global user.email 'nilesh32236@gmail.com'
          git config --global url."https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Ensure labels exist
        run: |
          for label in autofix autofix:reviewed autofix:needs-manual-review autofix:merged audit:needs-info; do
            gh label create "$label" --force 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Add autofix label
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "autofix" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Close old autofix PRs for this issue
        run: |
          OLD=$(gh pr list --head "autofix/issue-${{ github.event.issue.number }}" --json number --jq '.[].number' 2>/dev/null || echo "")
          for pr in $OLD; do
            gh pr close "$pr" --delete-branch 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Run OpenCode to fix issue
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          share: true
          prompt: |
            You are fixing a GitHub issue. Read the issue body and comments at ${{ github.event.issue.html_url }}.

            Context: This is a monorepo with two projects:
            - `frontend/` — Next.js 16 App Router (React 19, Tailwind v4, axios, TanStack Query)
            - `backend/` — Express REST API (Node.js, Prisma, Zod, BullMQ, vitest)

            Before making changes:
            1. Check which project the issue relates to by looking at file paths.
            2. If files are under `frontend/`, read `frontend/AGENTS.md` for conventions; if under `backend/`, refer to `backend/README.md`.
            3. Read `frontend/biome.json` or `backend/biome.json` for linting rules depending on the project.
            4. Read any relevant source files to understand existing patterns.

            INSTRUCTIONS:
            1. Read the issue — it tells you the file, line, and fix needed.
            2. Open the file and apply the fix.
            3. If the file doesn't exist, create it following project patterns (check sister files for reference).
            4. After making changes, determine the correct subdirectory: if changes are in `frontend/`, run commands from `frontend/`; if in `backend/`, run from `backend/`.
            5. Run `pnpm typecheck` — fix any type errors (in the correct subdirectory).
            6. Run `pnpm lint` — fix any lint errors (in the correct subdirectory).
            7. Commit and push all changes.

            RULES:
            - Make the exact change the issue describes — nothing more, nothing less.
            - Follow project conventions.
            - Read 2-3 similar existing files first before creating new ones (match pattern/style exactly).
            - Do NOT add features, refactor unrelated code, or change anything outside the issue scope.
            - If you CANNOT determine what to change (issue is too vague or conflicting), write `.fix-stuck.md` explaining what's missing.
            - Write `.fix-summary.md` describing what you changed.

            SAFETY RULES:
            - Fix ONLY what the issue describes. Do not touch unrelated files.
            - Prefer the minimal change that resolves the issue.
            - Do not change formatting, rename variables, or refactor code beyond the fix.
            - If the issue description is unclear or doesn't match the code, write `.fix-stuck.md` explaining what's missing rather than guessing.
            - After fixing, verify the fix actually resolves the described problem (not just that it compiles).

      - name: Capture OpenCode changes
        id: capture
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          OUR_BRANCH="autofix/issue-${ISSUE_NUM}"

          # Find OpenCode PR whose title or body mentions the issue number
          OPENCODE_PR=$(gh pr list --state open --json headRefName,title,body,number \
            --jq ".[] | select(.headRefName | startswith(\"opencode/\")) | select((.title + \" \" + .body) | contains(\"#${ISSUE_NUM}\")) | .number" \
            | head -1)

          if [ -n "$OPENCODE_PR" ]; then
            OPENCODE_BRANCH=$(gh pr view "$OPENCODE_PR" --json headRefName --jq '.headRefName')
            echo "Found OpenCode branch: $OPENCODE_BRANCH for issue #$ISSUE_NUM"
            git fetch origin "$OPENCODE_BRANCH"
            git checkout -b "$OUR_BRANCH" "origin/$OPENCODE_BRANCH"

            # Get fix summary if it exists
            git show "origin/$OPENCODE_BRANCH:.fix-summary.md" > .fix-summary.md 2>/dev/null || true
            git show "origin/$OPENCODE_BRANCH:.fix-stuck.md" > .fix-stuck.md 2>/dev/null || true
            git show "origin/$OPENCODE_BRANCH:.fix-questions.md" > .fix-questions.md 2>/dev/null || true

            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "opencode_branch=$OPENCODE_BRANCH" >> "$GITHUB_OUTPUT"
            echo "opencode_pr=$OPENCODE_PR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback: check local working tree
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "opencode_branch=" >> "$GITHUB_OUTPUT"
            echo "opencode_pr=" >> "$GITHUB_OUTPUT"
            git checkout -b "$OUR_BRANCH"
            exit 0
          fi

          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "opencode_branch=" >> "$GITHUB_OUTPUT"
          echo "opencode_pr=" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Create PR from changes
        if: steps.capture.outputs.has_changes == 'true'
        id: create-pr
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          OUR_BRANCH="autofix/issue-${ISSUE_NUM}"

          # Push our branch
          git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push origin "$OUR_BRANCH"

          # Create our PR
          TITLE="[Autofix] $(gh issue view "$ISSUE_NUM" --json title --jq '.title')"
          BODY="## Fixes #${ISSUE_NUM}\n\n"
          if [ -f .fix-summary.md ]; then
            BODY="${BODY}$(cat .fix-summary.md)\n\n"
          fi
          BODY="${BODY}---\n*Auto-generated by fix-audit-issue workflow*"

          PR_URL=$(gh pr create \
            --base main \
            --head "$OUR_BRANCH" \
            --title "$TITLE" \
            --body "$(echo -e "$BODY")" \
            --repo "${{ github.repository }}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          PR_NUM=$(echo "$PR_URL" | grep -oP '/pull/\K[0-9]+' || echo "")
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"

          gh issue comment "$ISSUE_NUM" \
            --body "PR created: $PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Add autofix label to PR
        if: steps.create-pr.outputs.pr_number != ''
        run: |
          gh pr edit ${{ steps.create-pr.outputs.pr_number }} --add-label 'autofix'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Close OpenCode PR
        if: steps.capture.outputs.has_changes == 'true' && steps.capture.outputs.opencode_pr != ''
        run: |
          OPENCODE_PR="${{ steps.capture.outputs.opencode_pr }}"
          gh pr close "$OPENCODE_PR" --delete-branch || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Post stuck/comment
        if: steps.capture.outputs.has_changes != 'true'
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}

          if [ -f .fix-stuck.md ] || [ -f .fix-questions.md ]; then
            BODY="## I need more information\n\n"
            [ -f .fix-stuck.md ] && BODY="${BODY}$(cat .fix-stuck.md)\n\n"
            [ -f .fix-questions.md ] && BODY="${BODY}$(cat .fix-questions.md)\n\n"
            BODY="${BODY}Comment \`/fix\` when you've provided the information."
            gh issue edit "$ISSUE_NUM" --add-label "audit:needs-info" --remove-label "autofix"
          else
            BODY="## No changes made\n\nThe automated fix could not determine what to change."
            if [ -f .fix-summary.md ]; then
              BODY="$BODY\n\n$(cat .fix-summary.md)"
            fi
          fi
          gh issue comment "$ISSUE_NUM" --body "$(echo -e "$BODY")" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Report failure
        if: failure()
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "OpenCode attempted to fix this issue but encountered an error. Check workflow logs for details."
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}